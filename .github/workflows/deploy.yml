name: Deploy on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            : "${DEPLOY_PATH:?DEPLOY_PATH secret is empty}"
            rm -rf "${DEPLOY_PATH:?}"/*
            mkdir -p "$DEPLOY_PATH"

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # "dist/*" misses dotfiles, so .htaccess is listed explicitly to make
          # sure the cache/SPA-rewrite rules are (re)deployed and overwritten.
          source: "dist/*,dist/.htaccess"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_components: 1

      - name: Fix permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            find ${{ secrets.DEPLOY_PATH }} -type d -exec chmod 755 {} \;
            find ${{ secrets.DEPLOY_PATH }} -type f -exec chmod 644 {} \;
