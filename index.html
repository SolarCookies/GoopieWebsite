
  <!DOCTYPE html>
  <html lang="en" style="background:#1b2838">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#1b2838" />
      <link rel="icon" type="image/png" href="https://x02.me/i/G6QA.png" />
      <title>Goopie</title>

      <!-- Redirect real deep paths into hash routes before React mounts.
           Needed so that humans landing on /library/foo (served by the OG
           proxy function for social embeds) end up at /#/library/foo. -->
      <script>
        (function () {
          var p = location.pathname;
          if (p !== '/' && !location.hash) {
            location.replace('/#' + p + location.search);
          }
        })();
      </script>

    <!-- Default Open Graph / social embed tags (game pages get dynamic ones via Cloud Function) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goopie.xyz/" />
    <meta property="og:site_name" content="Goopie" />
    <meta property="og:title" content="Goopie" />
    <meta property="og:description" content="Browse and play recompiled Xbox 360 games on modern hardware. Community-driven launcher and library." />
    <meta property="og:image" content="https://x02.me/i/G6QA.png" />
    <meta property="og:image:width" content="256" />
    <meta property="og:image:height" content="256" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Goopie" />
    <meta name="twitter:description" content="Browse and play recompiled Xbox 360 games on modern hardware. Community-driven launcher and library." />
    <meta name="twitter:image" content="https://x02.me/i/G6QA.png" />
    <meta name="description" content="Browse and play recompiled Xbox 360 games on modern hardware. Community-driven launcher and library." />

    <!-- Splash: shown instantly, removed when React mounts (#root becomes non-empty) -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #1b2838;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <body>
      <div id="splash">
        <img src="https://x02.me/i/G6QA.png" width="72" height="72" alt="Goopie" style="border-radius:12px;opacity:0.9" />
      </div>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
